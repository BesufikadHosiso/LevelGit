<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DEV ME PATH</title>
    <style>
      /* Custom Global Scrollbar */
      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }

      ::-webkit-scrollbar-track {
        background: #09090b; /* Deep night background */
      }

      ::-webkit-scrollbar-thumb {
        background: #6ee7b7; /* Our custom 'streak' color */
        border-radius: 10px;
        border: 2px solid #09090b; /* Creates a padding effect */
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #4ade80; /* Slightly brighter for hover state */
      }

      /* Firefox Support */
      * {
        scrollbar-width: thin;
        scrollbar-color: #6ee7b7 #09090b;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
